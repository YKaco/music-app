<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – Music Tool</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --border: #252525;
    --accent: #c8f135;
    --text: #e8e8e8;
    --muted: #555;
    --danger: #ff5555;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .box {
    width: 100%;
    max-width: 360px;
    padding: 20px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.03em;
    margin-bottom: 4px;
  }

  .sub {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
  }

  label {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input[type="password"] {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    padding: 11px 14px;
    border-radius: 7px;
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 16px;
    letter-spacing: 0.1em;
  }
  input[type="password"]:focus { border-color: var(--accent); }

  button {
    width: 100%;
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    font-size: 0.88rem;
    padding: 12px;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  button:hover  { background: #d6f94e; }
  button:active { transform: scale(0.97); }

  .err {
    font-size: 0.78rem;
    color: var(--danger);
    background: rgba(255,85,85,0.07);
    border: 1px solid rgba(255,85,85,0.2);
    border-radius: 7px;
    padding: 10px 14px;
    margin-bottom: 16px;
  }
</style>
</head>
<body>
<div class="box">
  <h1>MUSIC TOOL</h1>
  <p class="sub">YouTube → MP3 Converter</p>

  <div class="card">
    <form method="POST" action="/login/">
      {% if error %}
      <div class="err">{{ error }}</div>
      {% endif %}
      <label for="password">パスワード</label>
      <input type="password" id="password" name="password" autofocus placeholder="••••••••">
      <button type="submit">入る</button>
    </form>
  </div>
</div>
</body>
</html>
