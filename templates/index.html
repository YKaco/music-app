<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Tool</title>

<style>
body {
  font-family: sans-serif;
  background: #111;
  color: #fff;
  text-align: center;
  padding: 40px;
}

input, button {
  padding: 10px;
  margin: 8px;
  width: 80%;
  max-width: 400px;
}

button {
  background: #c8f135;
  border: none;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>Music Tool</h1>

<input id="url" placeholder="YouTube URL">

<br>

<input id="start" placeholder="start秒（任意）">
<input id="end" placeholder="end秒（任意）">

<br>

<button onclick="download()">Download MP3</button>

<p id="status"></p>

<script>
async function download() {
    const url = document.getElementById("url").value;
    const start = document.getElementById("start").value;
    const end = document.getElementById("end").value;

    document.getElementById("status").innerText = "処理中...";

    const res = await fetch("/download", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({url, start, end})
    });

    const data = await res.json();

    if (data.filename) {
        document.getElementById("status").innerHTML =
            `<a href="/file/${data.filename}">ダウンロード</a>`;
    } else {
        document.getElementById("status").innerText = data.error;
    }
}
</script>

</body>
</html>
